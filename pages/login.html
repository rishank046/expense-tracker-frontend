<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker | Auth</title>
    <style>
        /* Aapka existing CSS yahan rahega */
        @import url('../assets/css/variables.css');

        :root {
            --accent: #007aff;
            --glass-bg: rgba(20, 20, 20, 0.6);
            --glass-border: rgba(255, 255, 255, 0.15);
            --input-bg: rgba(255, 255, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body{
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #050505;
            overflow: hidden;
        }

        .bg-video {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: -1;
            filter: brightness(0.6);
        }

        main {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, transparent 0%, rgba(0, 0, 0, 0.4) 100%);
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        /* --- NEW TOGGLE CSS --- */
        .auth-toggle {
            display: flex;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px solid var(--glass-border);
        }

        .toggle-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .toggle-btn.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 10px rgba(0, 122, 255, 0.3);
        }

        /* Form Visibility */
        .auth-form { display: none; }
        .auth-form.active { display: block; animation: fadeIn 0.4s ease-out; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Rest of your existing styling */
        .header { text-align: center; margin-bottom: 24px; }
        .header h1 { color: #fff; font-size: 28px; margin: 0; }
        .header p { color: rgba(255, 255, 255, 0.5); font-size: 14px; margin-top: 8px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; color: rgba(255, 255, 255, 0.8); font-size: 13px; margin-bottom: 8px; margin-left: 4px; }
        input { width: 100%; padding: 14px; background: var(--input-bg); border: 1px solid var(--glass-border); border-radius: 12px; color: #fff; outline: none; }
        input:focus { border-color: var(--accent); background: rgba(255, 255, 255, 0.08); }
        .submit-button { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
    <img src="../assets/images/login-poster.jpg" alt="Background" class="bg-video">
    
    <main>
        <div class="login-card">
            <div class="auth-toggle">
                <button class="toggle-btn active" onclick="switchForm('login')">Log In</button>
                <button class="toggle-btn" onclick="switchForm('register')">Register</button>
            </div>

            <form action="/login" method="POST" class="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="name@company.com">
                </div>

            <form id="login-form" class="auth-form active" action="/login" method="POST">
                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" name="email" required placeholder="name@company.com">
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" name="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="submit-button">Log In</button>
            </form>

            <form id="register-form" class="auth-form" action="/register" method="POST">
                <div class="form-group">
                    <label for="reg-name">Full Name</label>
                    <input type="text" id="reg-name" name="name" required placeholder="Parshant">
                </div>
                <div class="form-group">
                    <label for="reg-email">Email Address</label>
                    <input type="email" id="reg-email" name="email" required placeholder="name@company.com">
                </div>
                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" name="password" required placeholder="••••••••">
                </div>
               <div class="form-group">
    <label for="reg-confirm">Confirm Password</label>
    <input type="password" id="reg-confirm" name="confirm_password" required placeholder="••••••••">
    <span id="password-error" style="color: #ff3b30; font-size: 12px; margin-top: 5px; display: none;">Passwords do not match</span>
</div>
                <button type="submit" class="submit-button">Create Account</button>
            </form>

            <div class="footer-links" style="text-align: center; margin-top: 20px;">
                <a href="#" style="color: var(--accent); text-decoration: none; font-size: 13px;">Forgot password?</a>
            </div>
        </div>
    </main>
  <!--toggle script-->
    <script>
        function switchForm(type) {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const title = document.getElementById('form-title');
            const subtitle = document.getElementById('form-subtitle');
            const buttons = document.querySelectorAll('.toggle-btn');

            if (type === 'login') {
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
                buttons[0].classList.add('active');
                buttons[1].classList.remove('active');
                title.innerText = "Welcome Back";
                subtitle.innerText = "Manage your expenses with precision.";
            } else {
                registerForm.classList.add('active');
                loginForm.classList.remove('active');
                buttons[1].classList.add('active');
                buttons[0].classList.remove('active');
                title.innerText = "Create Account";
                subtitle.innerText = "Start tracking your journey today.";
            }
        }
    </script>
    <!--confirm password script-->
    <script>
const regForm = document.getElementById('register-form');
const password = document.getElementById('reg-password');
const confirmPassword = document.getElementById('reg-confirm');
const errorMsg = document.getElementById('password-error');

function validatePasswords() {
    if (confirmPassword.value === "") {
        errorMsg.style.display = 'none';
        confirmPassword.style.borderColor = "var(--glass-border)";
    } else if (password.value !== confirmPassword.value) {
        errorMsg.style.display = 'block';
        confirmPassword.style.borderColor = "#ff3b30"; // Red border
    } else {
        errorMsg.style.display = 'none';
        confirmPassword.style.borderColor = "#34c759"; // Green border
    }
}

// Input karte waqt check karne ke liye
password.addEventListener('input', validatePasswords);
confirmPassword.addEventListener('input', validatePasswords);

// Form submit ke waqt final check
regForm.addEventListener('submit', function(e) {
    if (password.value !== confirmPassword.value) {
        e.preventDefault(); // Rokne ke liye
        errorMsg.style.display = 'block';
    }
});
</script>
</body>
</html>
